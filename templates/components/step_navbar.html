<script>
// Auto-detect current step and update progress
(function() {
    function initStepNavbar() {
        const currentPath = window.location.pathname;
        let currentStep = 1;
        
        // Detect current step from URL
        if (currentPath.includes('/step1')) {
            currentStep = 1;
        } else if (currentPath.includes('/step2')) {
            currentStep = 2;
        } else if (currentPath.includes('/step3')) {
            currentStep = 3;
        } else if (currentPath.includes('/step4')) {
            currentStep = 4;
        }
        
        // Update progress based on current step
        updateStepProgress(currentStep);
        
        // Add click handlers for navigation (optional)
        addStepClickHandlers();
    }
    
    function updateStepProgress(currentStep) {
        const stepItems = document.querySelectorAll('.step-item');
        const connectors = document.querySelectorAll('.step-connector');
        
        stepItems.forEach((item, index) => {
            const stepNumber = index + 1;
            
            // Remove all classes first
            item.classList.remove('active', 'completed');
            
            if (stepNumber < currentStep) {
                item.classList.add('completed');
            } else if (stepNumber === currentStep) {
                item.classList.add('active');
            }
        });
        
        connectors.forEach((connector, index) => {
            const connectorStep = index + 1;
            
            // Remove all classes first
            connector.classList.remove('active', 'completed');
            
            if (connectorStep < currentStep) {
                connector.classList.add('completed');
            } else if (connectorStep === currentStep) {
                connector.classList.add('active');
            }
        });
    }
    
    function addStepClickHandlers() {
        const stepItems = document.querySelectorAll('.step-item');
        
        stepItems.forEach((item, index) => {
            const stepNumber = index + 1;
            
            item.addEventListener('click', function() {
                // Optional: Allow navigation to previous steps
                const currentPath = window.location.pathname;
                let currentStep = 1;
                
                if (currentPath.includes('/step1')) currentStep = 1;
                else if (currentPath.includes('/step2')) currentStep = 2;
                else if (currentPath.includes('/step3')) currentStep = 3;
                else if (currentPath.includes('/step4')) currentStep = 4;
                
                // Only allow navigation to previous steps or current step
                if (stepNumber <= currentStep) {
                    window.location.href = `/step${stepNumber}`;
                }
            });
            
            // Add pointer cursor for clickable steps
            const currentPath = window.location.pathname;
            let currentStep = 1;
            
            if (currentPath.includes('/step1')) currentStep = 1;
            else if (currentPath.includes('/step2')) currentStep = 2;
            else if (currentPath.includes('/step3')) currentStep = 3;
            else if (currentPath.includes('/step4')) currentStep = 4;
            
            if (stepNumber <= currentStep) {
                item.style.cursor = 'pointer';
            }
        });
    }
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initStepNavbar);
    } else {
        initStepNavbar();
    }
})();
</script>
